version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto25
    commands:
      - java -version
      - chmod +x mvnw || true

  build:
    commands:
      - |
        java -version
        mvn -v
        ls -ltr

reports:
  junit_reports:
    files:
      - '**/target/surefire-reports/*.xml'
      - '**/target/failsafe-reports/*.xml'
    file-format: JUNITXML

cache:
  paths:
    - '/root/.m2/**/*'
