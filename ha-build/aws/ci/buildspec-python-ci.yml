version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - python --version
      - pip --version
      - python -m pip install --upgrade pip
      - pip install -r ha_track/requirements.txt
      - pip install -r ha_track/requirements-dev.txt
      - mkdir -p /var/app/log

  build:
    commands:
      - python -m ruff check --no-cache --config ha_track/ruff.toml ha_track/api
      - python ha_track/manage.py check
      - python ha_track/manage.py test api.tests -v 2

cache:
  paths:
    - '/root/.cache/pip/**/*'
