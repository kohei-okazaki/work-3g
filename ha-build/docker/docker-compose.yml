# ローカル開発環境用。AWS dev環境はTerraform/ECSで管理する。
services:
  # 健康管理アプリAPI Container
  ha-api:
    image: work3g/ha-api:local
    build:
      context: .
      dockerfile: Dockerfile.ha-api
    working_dir: /work
    ports:
      - "8081:8081"
    environment:
      TZ: Asia/Tokyo
      SERVER_PORT: "8081"
      SPRING_PROFILES_ACTIVE: local
      SPRING_FLYWAY_ENABLED: "true"
      DB_URL: "jdbc:mysql://mysql:3306/work3g?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo"
      DB_USER: "app_user"
      DB_PW: "3w4tamudnxgr4"
      # AWSプロファイル
      AWS_PROFILE: default
      HEALTHINFO_DASHBOARD_URL: "http://ha-dashboard:8080/"
      HEALTHINFO_API_URL: "http://ha-api:8081/api/"
      ROOT_API_URL: "http://ha-root-api:8082/api/root/"
      HEALTHINFO_TRACK_API_URL: "http://ha-track:8086/api/"
    volumes:
      - ./ha-pom:/work/ha-pom
      - ./ha-common:/work/ha-common
      - ./ha-db:/work/ha-db
      - ./ha-business:/work/ha-business
      - ./ha-api:/work/ha-api
      - m2-cache:/root/.m2
      - ~/.aws:/root/.aws:ro
    command: bash -lc "mvn -f ha-pom/pom.xml -Dmaven.test.skip=true -pl :ha-api -am install && mvn -f ha-api/pom.xml -Dmaven.test.skip=true org.springframework.boot:spring-boot-maven-plugin:run"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - work-3g-network

  # 健康情報ダッシュボード Container
  ha-dashboard:
    image: work3g/ha-dashboard:local
    build:
      context: .
      dockerfile: Dockerfile.ha-dashboard
    working_dir: /work
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Tokyo
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: local
      SPRING_FLYWAY_ENABLED: "true"
      DB_URL: "jdbc:mysql://mysql:3306/work3g?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo"
      DB_USER: "app_user"
      DB_PW: "3w4tamudnxgr4"
      # AWSプロファイル
      AWS_PROFILE: default
      HEALTHINFO_DASHBOARD_URL: "http://ha-dashboard:8080/"
      HEALTHINFO_API_URL: "http://ha-api:8081/api/"
      ROOT_API_URL: "http://ha-root-api:8082/api/root/"
      HEALTHINFO_TRACK_API_URL: "http://ha-track:8086/api/"
    volumes:
      - ./ha-pom:/work/ha-pom
      - ./ha-common:/work/ha-common
      - ./ha-db:/work/ha-db
      - ./ha-business:/work/ha-business
      - ./ha-dashboard:/work/ha-dashboard
      - m2-cache:/root/.m2
      - ~/.aws:/root/.aws:ro
    command: bash -lc "mvn -f ha-pom/pom.xml -Dmaven.test.skip=true -pl :ha-dashboard -am install && mvn -f ha-dashboard/pom.xml -Dmaven.test.skip=true org.springframework.boot:spring-boot-maven-plugin:run"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - work-3g-network

  # 管理者用サイト API Container
  ha-root-api:
    image: work3g/ha-root-api:local
    build:
      context: .
      dockerfile: Dockerfile.ha-root-api
    working_dir: /work
    ports:
      - "8082:8082"
    environment:
      TZ: Asia/Tokyo
      SERVER_PORT: "8082"
      SPRING_PROFILES_ACTIVE: local
      SPRING_FLYWAY_ENABLED: "true"
      DB_URL: "jdbc:mysql://mysql:3306/work3g?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo"
      DB_USER: "app_user"
      DB_PW: "3w4tamudnxgr4"
      # AWSプロファイル
      AWS_PROFILE: default
      HEALTHINFO_DASHBOARD_URL: "http://ha-dashboard:8080/"
      HEALTHINFO_API_URL: "http://ha-api:8081/api/"
      ROOT_API_URL: "http://ha-root-api:8082/api/root/"
      HEALTHINFO_TRACK_API_URL: "http://ha-track:8086/api/"
    volumes:
      - ./ha-pom:/work/ha-pom
      - ./ha-common:/work/ha-common
      - ./ha-db:/work/ha-db
      - ./ha-business:/work/ha-business
      - ./ha-root:/work/ha-root
      - m2-cache:/root/.m2
      - ~/.aws:/root/.aws:ro
    command: bash -lc "mvn -f ha-pom/pom.xml -Dmaven.test.skip=true -pl :ha-root -am install && mvn -f ha-root/pom.xml -Dmaven.test.skip=true org.springframework.boot:spring-boot-maven-plugin:run"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - work-3g-network
  
  # 管理者用サイト Front Container
  ha-root-front:
    image: work3g/ha-root-front:local
    build:
      context: .
      dockerfile: Dockerfile.ha-root-front
      pull: true
    working_dir: /app
    ports:
      - "8083:8083"
    environment:
      TZ: Asia/Tokyo
      HOST: "0.0.0.0"
      PORT: "8083"
    volumes:
      - ./ha-root/front:/app
      - ha_root_front_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev --"
    depends_on:
      - ha-root-api
    networks:
      - work-3g-network

  # 健康情報蓄積API Container
  ha-track:
    image: work3g/ha-track:local
    build:
      context: .
      dockerfile: Dockerfile.ha-track
      pull: true
    working_dir: /app
    ports:
      - "8086:8086"
    environment:
      TZ: Asia/Tokyo
      DJANGO_ALLOWED_HOSTS: "ha-track,localhost,127.0.0.1"
      AWS_PROFILE: default
    volumes:
      - ./ha_track:/app
      - ~/.aws:/root/.aws:ro
    command: bash -lc "python manage.py runserver 0.0.0.0:8086"
    networks:
      - work-3g-network

  # 健康管理バッチ Container
  ha-batch:
    image: work3g/ha-batch:local
    build:
      context: .
      dockerfile: Dockerfile.ha-batch
    working_dir: /work
    environment:
      TZ: Asia/Tokyo
      SPRING_PROFILES_ACTIVE: local
      SPRING_FLYWAY_ENABLED: "true"
      DB_URL: "jdbc:mysql://mysql:3306/work3g?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo"
      DB_USER: "app_user"
      DB_PW: "3w4tamudnxgr4"
      # AWSプロファイル
      AWS_PROFILE: default
      HEALTHINFO_DASHBOARD_URL: "http://ha-dashboard:8080/"
      HEALTHINFO_API_URL: "http://ha-api:8081/api/"
      ROOT_API_URL: "http://ha-root-api:8082/api/root/"
      HEALTHINFO_TRACK_API_URL: "http://ha-track:8086/api/"
    volumes:
      - ./ha-pom:/work/ha-pom
      - ./ha-common:/work/ha-common
      - ./ha-db:/work/ha-db
      - ./ha-business:/work/ha-business
      - ./ha-batch:/work/ha-batch
      - m2-cache:/root/.m2
      - ~/.aws:/root/.aws:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - work-3g-network

  # MySQL Container
  mysql:
    image: mysql:8.4
    container_name: work3g-mysql
    environment:
      TZ: Asia/Tokyo
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: work3g
      MYSQL_USER: app_user
      MYSQL_PASSWORD: 3w4tamudnxgr4
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpass"]
      interval: 60s
      timeout: 5s
      retries: 5
    networks:
      - work-3g-network

# volume設定
volumes:
  mysql-data:
  m2-cache:
  ha_root_front_node_modules:

# ネットワーク設定
networks:
  work-3g-network:
    name: work-3g-network
