AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template for the health calculation HTTP API.

Parameters:
  ProjectName:
    Type: String
    Default: calc-api
  StageName:
    Type: String
    Default: dev
  BasicFunctionName:
    Type: String
    Default: basic
  CalorieFunctionName:
    Type: String
    Default: calorie
  BreathingCapacityFunctionName:
    Type: String
    Default: breathing_capacity
  FunctionRuntime:
    Type: String
    Default: python3.14
    AllowedValues:
      - python3.14
  FunctionTimeout:
    Type: Number
    Default: 10

Resources:
  CalcApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BasicFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref BasicFunctionName
      Runtime: !Ref FunctionRuntime
      Architectures:
        - x86_64
      Handler: basic.lambda_handler
      Code: "lambda/"
      Role: !GetAtt CalcApiFunctionRole.Arn
      Timeout: !Ref FunctionTimeout

  CalorieFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref CalorieFunctionName
      Runtime: !Ref FunctionRuntime
      Architectures:
        - x86_64
      Handler: calorie.lambda_handler
      Code: "lambda/"
      Role: !GetAtt CalcApiFunctionRole.Arn
      Timeout: !Ref FunctionTimeout

  BreathingCapacityFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref BreathingCapacityFunctionName
      Runtime: !Ref FunctionRuntime
      Architectures:
        - x86_64
      Handler: breathing_capacity.lambda_handler
      Code: "lambda/"
      Role: !GetAtt CalcApiFunctionRole.Arn
      Timeout: !Ref FunctionTimeout

  HealthCalcApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-${StageName}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET

  # Matches the logical ID generated by SAM for HealthCalcApi StageName=dev.
  HealthCalcApidevStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HealthCalcApi
      StageName: !Ref StageName
      AutoDeploy: true

  BasicIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HealthCalcApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
        - FunctionArn: !GetAtt BasicFunction.Arn
      PayloadFormatVersion: "2.0"

  CalorieIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HealthCalcApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
        - FunctionArn: !GetAtt CalorieFunction.Arn
      PayloadFormatVersion: "2.0"

  BreathingCapacityIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HealthCalcApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub
        - "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations"
        - FunctionArn: !GetAtt BreathingCapacityFunction.Arn
      PayloadFormatVersion: "2.0"

  BasicRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HealthCalcApi
      RouteKey: "GET /basic"
      Target: !Sub "integrations/${BasicIntegration}"

  CalorieRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HealthCalcApi
      RouteKey: "GET /calorie"
      Target: !Sub "integrations/${CalorieIntegration}"

  BreathingCapacityRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HealthCalcApi
      RouteKey: "GET /breathing_capacity"
      Target: !Sub "integrations/${BreathingCapacityIntegration}"

  BasicInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BasicFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HealthCalcApi}/*/GET/basic"

  CalorieInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CalorieFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HealthCalcApi}/*/GET/calorie"

  BreathingCapacityInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BreathingCapacityFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HealthCalcApi}/*/GET/breathing_capacity"

Outputs:
  ApiId:
    Description: API Gateway HTTP API ID.
    Value: !Ref HealthCalcApi
  ApiUrl:
    Description: API Gateway endpoint URL.
    Value: !Sub "https://${HealthCalcApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/"
  BasicFunctionArn:
    Description: Basic Lambda function ARN.
    Value: !GetAtt BasicFunction.Arn
  CalorieFunctionArn:
    Description: Calorie Lambda function ARN.
    Value: !GetAtt CalorieFunction.Arn
  BreathingCapacityFunctionArn:
    Description: Breathing capacity Lambda function ARN.
    Value: !GetAtt BreathingCapacityFunction.Arn
